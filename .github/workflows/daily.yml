name: 공고 수집

on:
  schedule:
    # GitHub cron은 UTC 기준이다. KST = UTC+9.
    # 정각은 전 세계 요청이 몰려 예약 실행이 밀리거나 건너뛰어진다.
    # 몇 분 어긋낸 시각을 쓰면 대기열이 훨씬 짧다.
    - cron: "17 1 * * *"   # 10:17 KST
    - cron: "17 4 * * *"   # 13:17 KST
  workflow_dispatch:        # 수동 실행 버튼

# 결과(data/, docs/)를 저장소에 되커밋해야 하므로 쓰기 권한이 필요하다.
permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # 일부 소스가 막혀도(예: 해외 IP 차단) 나머지는 갱신해야 한다.
      # 여기서 실패시키면 이후 단계가 통째로 건너뛰어져 웹페이지가 멈춘다.
      # 실패 사실은 마지막 단계에서 별도로 알린다.
      - name: 수집
        id: collect
        continue-on-error: true
        env:
          PYTHONUTF8: "1"
        run: python collect.py

      - name: 분류
        env:
          PYTHONUTF8: "1"
        run: python filter.py

      - name: 렌더
        env:
          PYTHONUTF8: "1"
        run: python render.py

      - name: 결과 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 공고 자동 갱신 $(date -u +'%Y-%m-%d')"
            git push
          fi

      # 갱신은 마쳤으니, 실패한 소스가 있으면 이제 알린다.
      # 조용히 넘어가면 어느 소스가 몇 주째 멈춰 있는지 아무도 모르게 된다.
      - name: 수집 실패 확인
        if: steps.collect.outcome == 'failure'
        run: |
          echo "::warning::일부 소스 수집에 실패했다. 위 '수집' 단계 로그를 확인할 것."
          python - <<'PY'
          import json, sys
          d = json.load(open("data/announcements.json", encoding="utf-8"))
          print("실패한 소스:", d.get("failures"))
          print("보존된 총 건수:", d.get("count"))
          sys.exit(1)
          PY
