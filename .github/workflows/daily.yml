name: 공고 수집

on:
  schedule:
    # GitHub cron은 UTC 기준이다. KST = UTC+9.
    #
    # 무료 요금제의 예약 실행은 정시성이 없다. 실측(2026-07-22~23) 결과
    # 3회 중 1회만 걸렸고 그마저 2시간 23분 늦었다. 우리가 고칠 수 없는
    # 대기열 문제이므로, 시각을 맞추는 대신 시도 횟수를 늘려 확률을 높인다.
    # 아래 중 하나만 걸려도 그 시간대 갱신은 끝난다(변경 없으면 커밋도 없다).
    - cron: "7 23 * * *"   #  8:07 KST
    - cron: "17 0 * * *"   #  9:17 KST
    - cron: "23 1 * * *"   # 10:23 KST
    - cron: "37 3 * * *"   # 12:37 KST
    - cron: "13 4 * * *"   # 13:13 KST
    - cron: "41 6 * * *"   # 15:41 KST
  workflow_dispatch:        # 수동 실행 버튼

  # 웹페이지 버튼으로 결정 파일이 올라오면 바로 화면에 반영한다.
  # 다음 예약까지 기다리면 '눌렀는데 안 바뀐다'가 되어 오해를 부른다.
  # 수집은 3시간 간격 규칙에 걸려 대체로 생략되고 분류·렌더만 다시 돈다.
  push:
    paths:
      - "config/decisions/**"
      - "config/curated.yaml"

# 결과(data/, docs/)를 저장소에 되커밋해야 하므로 쓰기 권한이 필요하다.
permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # 일부 소스가 막혀도(예: 해외 IP 차단) 나머지는 갱신해야 한다.
      # 여기서 실패시키면 이후 단계가 통째로 건너뛰어져 웹페이지가 멈춘다.
      # 실패 사실은 마지막 단계에서 별도로 알린다.
      # 사람이 버튼을 누른 것은 '지금 받아와라'는 뜻이므로 간격 제한을 무시한다.
      # 예약 실행은 3시간 간격 규칙을 지킨다(중복 수집으로 상대 서버에 부담을 주지 않기 위해).
      - name: 수집
        id: collect
        continue-on-error: true
        env:
          PYTHONUTF8: "1"
        run: python collect.py ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}

      - name: 분류
        env:
          PYTHONUTF8: "1"
        run: python filter.py

      - name: 렌더
        env:
          PYTHONUTF8: "1"
        run: python render.py

      - name: 결과 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 공고 자동 갱신 $(date -u +'%Y-%m-%d')"
            git push
          fi

      # 며칠째 수집이 안 되고 있으면 실패로 끝내 메일이 가게 한다.
      # 예약이 아예 안 걸리는 경우는 실행 자체가 없어 아무 신호도 없다.
      # 어쩌다 한 번이라도 돌면 이 단계에서 잡힌다.
      - name: 수집 지연 확인
        run: |
          python - <<'PY'
          import json, sys
          from datetime import datetime
          d = json.load(open("data/announcements.json", encoding="utf-8"))
          gap = (datetime.now() - datetime.fromisoformat(d["collected_at"])).total_seconds() / 3600
          print(f"마지막 수집: {gap:.1f}시간 전")
          if gap >= 48:
              print("::error::48시간 넘게 수집되지 않았다. 예약 실행을 점검할 것.")
              sys.exit(1)
          PY

      # 갱신은 마쳤으니, 실패한 소스가 있으면 이제 알린다.
      # 조용히 넘어가면 어느 소스가 몇 주째 멈춰 있는지 아무도 모르게 된다.
      - name: 수집 실패 확인
        if: steps.collect.outcome == 'failure'
        run: |
          echo "::warning::일부 소스 수집에 실패했다. 위 '수집' 단계 로그를 확인할 것."
          python - <<'PY'
          import json, sys
          d = json.load(open("data/announcements.json", encoding="utf-8"))
          print("실패한 소스:", d.get("failures"))
          print("보존된 총 건수:", d.get("count"))
          sys.exit(1)
          PY
