# 공고 판정 기준. 로직을 고치지 말고 여기를 고친다.
#
# 판정에 쓰이는 것은 region / keywords / scoring 세 가지뿐이다.
# 회사 상세 정보는 이 저장소에 두지 않는다(공개 저장소이므로).

region:
  # 트랙 A(직접 신청)에서만 쓴다. 트랙 B는 고객사 기준이라 지역 제한 없음.
  eligible: [전국, 경기, 성남, 판교]
  conditional:
    인천: 조건부 지역           # 탈락시키지 않고 '조건부' 배지로 표시
  # 그 외 지자체는 트랙 A에서 제외

keywords:
  # 트랙 A — 우리가 신청자
  # 트랙 A/B를 가르는 기준. 이 단어가 있으면 우리가 직접 신청하는 사업으로 본다.
  # AI는 여기 넣지 않는다 — 'AI 제조혁신'처럼 고객사향 사업에도 흔히 붙어서
  # 트랙 판정을 흐린다. 점수에는 반영하되 트랙 결정에는 쓰지 않는다.
  track_a_decisive: [로봇, 자율주행, 실외이동로봇, 서비스로봇, 제조로봇, 물류로봇]

  track_a_strong: [로봇, 자율주행, 실외이동로봇, 서비스로봇, 제조로봇, 물류로봇, 실증,
                   AI, 인공지능, 뉴로심볼릭, 온디바이스]
  track_a_medium: [관제, 모빌리티, 자율, R&D, 기술개발, 창업도약, 해외실증, 시험평가, 인증,
                   딥러닝, 머신러닝, 데이터]

  # 트랙 B — 고객사가 신청자, 우리는 공급기업으로 참여
  track_b_strong: [스마트공장, 제조혁신, 로봇도입, 공정자동화, 자율형공장, 제조데이터]

  # 어느 트랙에도 해당 없음 → 후보에서 제외
  exclude: [소상공인, 자영업, 문화콘텐츠, 관광, 농업, 수산, 축산, 사회적기업,
            여성기업, 장애인기업, 전통시장, 소셜벤처, 공예, 디자인개발,
            반려동물, 관상어, 식품위생, 예비창업, 청년창업, 일경험, 공모전]

collect:
  # 기업마당에서 검색할 키워드. 최신 목록만 보면 15건 밖으로 밀린 공고를 놓친다.
  # 늘릴수록 요청이 늘어나니 꼭 필요한 것만 둔다.
  search_keywords: [로봇, 자율주행, 스마트공장, 제조혁신, 실증, 물류자동화, 인공지능]

scoring:
  strong: 3
  medium: 1
  deadline_soon_days: 14       # 마감 임박 표시 기준
  min_score: 3                 # 이 점수 미만은 신규 후보에도 안 올림
