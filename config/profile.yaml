# 공고 판정 기준. 로직을 고치지 말고 여기를 고친다.
#
# 판정에 쓰이는 것은 region / keywords / scoring 세 가지뿐이다.
# 회사 상세 정보는 이 저장소에 두지 않는다(공개 저장소이므로).

region:
  # 트랙 A(직접 신청)에서 쓴다. 트랙 B는 고객사 기준이라 지역 제한 없음.
  eligible: [전국, 경기, 성남, 판교]
  # 트랙 C(사무실·공간)는 이전도 검토 대상이라 서울까지 넓게 본다.
  office_eligible: [전국, 서울, 경기, 성남, 판교]
  conditional:
    인천: 조건부 지역           # 탈락시키지 않고 '조건부' 배지로 표시
  # 그 외 지자체는 트랙 A에서 제외

keywords:
  # 트랙 A — 우리가 신청자
  # 트랙 A/B를 가르는 기준. 이 단어가 있으면 우리가 직접 신청하는 사업으로 본다.
  # AI는 여기 넣지 않는다 — 'AI 제조혁신'처럼 고객사향 사업에도 흔히 붙어서
  # 트랙 판정을 흐린다. 점수에는 반영하되 트랙 결정에는 쓰지 않는다.
  track_a_decisive: [로봇, 자율주행, 실외이동로봇, 서비스로봇, 제조로봇, 물류로봇]

  track_a_strong: [로봇, 자율주행, 실외이동로봇, 서비스로봇, 제조로봇, 물류로봇, 실증,
                   AI, 인공지능, 뉴로심볼릭, 온디바이스]
  track_a_medium: [관제, 모빌리티, 자율, R&D, 기술개발, 창업도약, 해외실증, 시험평가, 인증,
                   딥러닝, 머신러닝, 데이터]

  # 트랙 B — 고객사가 신청자, 우리는 공급기업으로 참여
  track_b_strong: [스마트공장, 제조혁신, 로봇도입, 공정자동화, 자율형공장, 제조데이터]

  # 트랙 C — 사무실·공간(임대료 지원, 입주기업 모집 등)
  track_c_strong: [입주기업, 입주공간, 임대료, 사무공간, 사무실, 창업보육, 보육센터,
                   지식산업센터, 창업공간, 오피스, 입주 모집, 공간 지원, 임차료,
                   스타트업타운, 창업허브, 벤처타운]

  # 어느 트랙에도 해당 없음 → 후보에서 제외
  exclude: [소상공인, 자영업, 문화콘텐츠, 관광, 농업, 수산, 축산, 사회적기업,
            여성기업, 장애인기업, 전통시장, 소셜벤처, 공예, 디자인개발,
            반려동물, 관상어, 식품위생, 예비창업, 청년창업, 일경험, 공모전]

collect:
  # 기업마당에서 검색할 키워드. 최신 목록만 보면 15건 밖으로 밀린 공고를 놓친다.
  # 늘릴수록 요청이 늘어나니 꼭 필요한 것만 둔다.
  search_keywords: [로봇, 자율주행, 스마트공장, 제조혁신, 실증, 물류자동화, 인공지능,
                    입주기업, 임대료, 창업보육, 사무공간]

  # 키워드 검색만으로는 제목에 그 단어가 없는 공고를 통째로 놓친다.
  # 우리와 관련된 지역은 제목과 무관하게 전부 받아와 필터가 판단하게 한다.
  # (기업마당 지역 코드. 목록 화면의 지역 버튼 id와 같다)
  area_codes:
    서울: "6110000"
    경기: "6410000"
    인천: "6280000"      # 조건부 지역이지만 지사 검토 중이라 함께 본다

scoring:
  strong: 3
  medium: 1
  deadline_soon_days: 14       # 마감 임박 표시 기준
  min_score: 3                 # 이 점수 미만은 신규 후보에도 안 올림

  # 자동 승격 — 이 조건을 모두 만족하면 사람 승인 없이 목록에 올린다.
  # 점수만으로는 안 된다. 점수는 '관련성'이 아니라 '키워드가 몇 개 겹쳤나'를
  # 재기 때문에, 지방 대학 창업보육센터가 9점으로 최상위에 온다.
  # 그래서 지역이 확인된 것만 승격한다(전국=미상은 사람이 본다).
  auto_promote:
    # 지역과 점수를 함께 본다. 어느 하나만으로는 판단이 안 된다.
    #
    # 우리 지역(경기·성남·판교·서울) 공고는 기준을 낮춘다. 지자체 사업은
    # 키워드가 하나만 걸려 3점에 그치는 경우가 많은데, 정작 우리에게
    # 중요한 건이다(예: 경기도 AI 혁신클러스터, 시흥시 AI·DX 지원).
    local_min_score: 3
    # 지역 표기가 없는 전국구 사업은 기준을 높인다. 로봇 실증처럼 좋은
    # 사업일수록 전국구라 지역을 요구하면 안 되지만, 대신 키워드가
    # 여러 개 걸릴 만큼 확실한 것만 올린다.
    nationwide_min_score: 6
    # 사무실(트랙 C)은 점수를 보지 않는다. '입주기업' 한 단어만 걸려도 사무실
    # 공고인 것은 확실하고, 정작 판단이 필요한 것은 위치다. 점수를 기준으로
    # 쓰면 '입주기업+창업보육+보육센터'가 겹친 대학 공고만 9점으로 올라가고
    # 국토교통 창업지원센터(판교, 3점) 같은 실제 후보가 걸러진다.
    # 대신 사무실은 위치가 본질이므로 지역 확인을 반드시 요구한다.
    office_min_score: 3
    office_require_region: true
    # 아래 단어가 제목에 있으면 점수가 높아도 승격하지 않는다.
    # 우리 업과 무관한데 키워드만 겹치는 분야다.
    block: [의료기기, 바이오, 메디컬, 반도체, 디스플레이, 배터리, 섬유,
            화장품, 식품, 콘텐츠, 게임, 예술, 문화, 관광]
  archive_after_days: 30       # 마감 후 이만큼 지나면 '마감' 탭에서도 내린다
                               # (curated.yaml의 승인 기록은 남는다)
